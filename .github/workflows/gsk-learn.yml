name: GSK Learn & Post
on:
  schedule:
    - cron: '*/20 * * * *'  # Every 20 minutes — constant learning
  workflow_dispatch:

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: GSK Learn — clone repos, read code, grow brain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          BRAIN_STATE_PATH: ${{ github.workspace }}/data/brain-state
        run: |
          mkdir -p $BRAIN_STATE_PATH
          node brain-in-a-box/scripts/gsk-actions-learn.js

      - name: Commit & push grown brain state
        run: |
          git config user.name "GSK Learning Bot"
          git config user.email "gsk@bot.com"
          git add data/brain-state/ brain-in-a-box/data/
          if git diff --cached --quiet; then
            echo "No new knowledge this cycle"
          else
            git commit -m "🧠 GSK cycle: studied repos, grew brain state"
            git push
          fi
